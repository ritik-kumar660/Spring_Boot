<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>

    <style>
        /* CSS will come in Part 2 */
        :root{
            --primary:#4f46e5;
            --primary-hover:#4338ca;
            --danger:#ef4444;
            --danger-hover:#dc2626;
            --success:#10b981;
            --light:#f3f4f6;
            --dark:#1f2937;
            --border:#e5e7eb;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            background:#f8fafc;
            padding:40px 20px;
            color:var(--dark);
        }

        .container{
            max-width:1100px;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .layout{
            display:grid;
            grid-template-columns:1fr 2fr;
            gap:25px;
        }

        @media(max-width:768px){
            .layout{
                grid-template-columns:1fr;
            }
        }

        .card{
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
        }

        .card h2{
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid var(--border);
            border-radius:6px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:var(--primary);
        }

        .btn-group{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        button{
            cursor:pointer;
            border:none;
            padding:10px 15px;
            border-radius:6px;
            font-weight:600;
        }

        #btnSave{
            flex:1;
            background:var(--primary);
            color:white;
        }

        #btnSave:hover{
            background:var(--primary-hover);
        }

        #btnClearBtn{
            flex:1;
            background:#e5e7eb;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#eef2ff;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        tr:hover{
            background:#f9fafb;
        }

        .editBtn{
            background:#2563eb;
            color:white;
            margin-right:5px;
        }

        .deleteBtn{
            background:#dc2626;
            color:white;
        }

        .alert{
            display:none;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
            font-weight:bold;
        }

        .alert-success{
            display:block;
            background:#dcfce7;
            color:#166534;
        }

        .alert-danger{
            display:block;
            background:#fee2e2;
            color:#991b1b;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🎓 Student Management System</h1>

    <div id="alertBox" class="alert"></div>

    <div class="layout">

        <!-- Form -->
        <div class="card">

            <h2 id="formTitle">Add Student</h2>

            <form id="studentForm">

                <input type="hidden" id="isEditMode" value="false">

                <div class="form-group">
                    <label>Student ID</label>
                    <input type="number" id="studentId" required>
                </div>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="studentName" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="studentAge" required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="studentDep" required>
                </div>

                <div class="btn-group">
                    <button type="button" id="btnClearBtn">
                        Clear
                    </button>

                    <button type="submit" id="btnSave">
                        Save Student
                    </button>
                </div>

            </form>

        </div>

        <!-- Table -->
        <div class="card">

            <h2>Students</h2>

            <table>

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Department</th>
                    <th>Created_AT</th>
                    <th>Updated_AT</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="tableBody">

                <tr id="noDataRow">
                    <td colspan="5" style="text-align:center;">
                        No Students Found
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>
    /* JavaScript will come in Part 3 */
    const API_URL = "http://localhost:8080";

    function showAlert(message, type) {
        const alertBox = document.getElementById("alertBox");

        alertBox.className = "alert alert-" + type;
        alertBox.innerText = message;

        setTimeout(() => {
            alertBox.style.display = "none";
        }, 3000);
    }

    function resetForm() {
        document.getElementById("studentForm").reset();
        document.getElementById("studentId").disabled = false;
        document.getElementById("isEditMode").value = "false";
        document.getElementById("formTitle").innerText = "Add Student";
        document.getElementById("btnSave").innerText = "Save Student";
    }

    async function loadStudents() {

        const response = await fetch(`${API_URL}/getAll`);

        if (!response.ok) return;

        const students = await response.json();

        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        if (students.length === 0) {
            tableBody.innerHTML = `
        <tr id="noDataRow">
            <td colspan="5" style="text-align:center;">No Students Found</td>
        </tr>`;
            return;
        }

        students.forEach(student => {

            tableBody.innerHTML += `
<tr id="row-${student.id}">
    <td>${student.id}</td>
    <td>${student.name}</td>
    <td>${student.age}</td>
    <td>${student.dep}</td>
    <td>${student.createdAt}</td>
    <td>${student.updatedAt}</td>
    <td>
        <button class="editBtn" onclick="editStudent(${student.id})">Edit</button>
        <button class="deleteBtn" onclick="deleteStudent(${student.id})">Delete</button>
    </td>
</tr>`;
        });
    }

    async function editStudent(id) {

        const response = await fetch(`${API_URL}/get/${id}`);

        if (!response.ok) {
            showAlert("Student not found", "danger");
            return;
        }

        const student = await response.json();

        document.getElementById("studentId").value = student.id;
        document.getElementById("studentName").value = student.name;
        document.getElementById("studentAge").value = student.age;
        document.getElementById("studentDep").value = student.dep;

        document.getElementById("studentId").disabled = true;
        document.getElementById("isEditMode").value = "true";

        document.getElementById("formTitle").innerText = "Update Student";
        document.getElementById("btnSave").innerText = "Update Student";
    }

    async function deleteStudent(id) {

        if (!confirm("Delete this student?")) return;

        const response = await fetch(`${API_URL}/delete/${id}`, {
            method: "DELETE"
        });

        if (response.ok) {
            showAlert("Student Deleted Successfully", "success");
            loadStudents();
        } else {
            showAlert("Delete Failed", "danger");
        }
    }

    document.getElementById("studentForm").addEventListener("submit", async function(e){

        e.preventDefault();

        const student = {
            id: Number(document.getElementById("studentId").value),
            name: document.getElementById("studentName").value,
            age: Number(document.getElementById("studentAge").value),
            dep: document.getElementById("studentDep").value
        };

        const editMode = document.getElementById("isEditMode").value === "true";

        let response;

        if(editMode){

            response = await fetch(`${API_URL}/update/${student.id}`,{

                method:"PUT",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(student)

            });

        }else{

            response = await fetch(`${API_URL}/create`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(student)

            });

        }

        if(response.ok){

            showAlert(
                editMode ? "Student Updated Successfully"
                    : "Student Added Successfully",
                "success"
            );

            resetForm();

            loadStudents();

        }else{

            showAlert("Operation Failed","danger");

        }

    });

    document.getElementById("btnClearBtn").addEventListener("click", resetForm);

    window.onload = loadStudents;
</script>

</body>
</html>
